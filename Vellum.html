<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Vellum · AI Governance Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
/* Academic Architect — tokens */
:root {
  /* Surfaces — warm neutrals, no pure white */
  --surface:                   #f9f9f9;
  --surface_dim:               #d9d9d9;
  --surface_bright:            #f9f9f9;
  --surface_container_lowest:  #ffffff;
  --surface_container_low:     #f4f3f3;
  --surface_container:         #eeeeee;
  --surface_container_high:    #e8e8e8;
  --surface_container_highest: #e2e2e2;

  /* Text */
  --on_surface:         #1a1c1c;
  --on_surface_variant: #3f4849;
  --outline:            #6f797a;
  --outline_variant:    #c1c8ca;

  /* Primary — Institutional Blue (teal) */
  --primary:            #001a20;
  --primary_container:  #023039;
  --on_primary:         #ffffff;
  --on_primary_container: #f0f9fc;

  /* Secondary — Corporate Maroon */
  --secondary:            #7b5456;
  --secondary_container:  #ffdada;
  --on_secondary:         #ffffff;
  --on_secondary_container: #31101a;

  /* Tertiary — Coral (success/energy) */
  --tertiary:            #d96c3f;
  --tertiary_container:  #ffdbcc;
  --on_tertiary:         #ffffff;
  --on_tertiary_container: #3b0f00;

  /* Semantic */
  --success: #3f7d58;
  --success_container: #d8eadc;
  --warning: #b06c00;
  --warning_container: #fde5b8;
  --error:   #9a2a2a;
  --error_container: #f8dada;

  /* Radii */
  --r-sm: 0.25rem;
  --r-md: 0.375rem;
  --r-lg: 0.5rem;
  --r-xl: 0.75rem;
  --r-2xl: 1rem;

  /* Spacing (8pt) */
  --s-1: 0.25rem;  --s-2: 0.5rem;  --s-3: 0.75rem;
  --s-4: 1rem;    --s-5: 1.25rem; --s-6: 1.5rem;
  --s-8: 2rem;    --s-10: 2.5rem; --s-12: 3rem;
  --s-16: 4rem;   --s-20: 5rem;   --s-24: 6rem;

  /* Shadows — ambient, teal-tinted */
  --shadow-sm: 0 2px 6px rgba(2, 48, 57, 0.04);
  --shadow-md: 0 8px 24px rgba(2, 48, 57, 0.06);
  --shadow-lg: 0 20px 40px rgba(2, 48, 57, 0.08);
}

/* Dark mode (not main target but available) */
.theme-dark {
  --surface:                   #0e1314;
  --surface_dim:               #0a0e0f;
  --surface_bright:            #1a2122;
  --surface_container_lowest:  #080c0d;
  --surface_container_low:     #141a1b;
  --surface_container:         #191f20;
  --surface_container_high:    #232a2b;
  --surface_container_highest: #2e3536;
  --on_surface:         #e3e3e3;
  --on_surface_variant: #bfc8c9;
  --outline:            #8a9393;
  --outline_variant:    #3a4243;
  --primary:            #7ed4e6;
  --primary_container:  #003744;
  --on_primary:         #00363f;
  --on_primary_container: #d2f4fc;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--on_surface);
  background: var(--surface);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ---- typography ---- */
.font-display { font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
.font-mono    { font-family: 'JetBrains Mono', monospace; }

.display-lg { font-family: 'Manrope'; font-size: 3.5rem;  font-weight: 700; letter-spacing: -0.03em; line-height: 1.02; }
.display-md { font-family: 'Manrope'; font-size: 2.75rem; font-weight: 700; letter-spacing: -0.025em; line-height: 1.05; }
.headline-lg{ font-family: 'Manrope'; font-size: 2rem;    font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; }
.headline-md{ font-family: 'Manrope'; font-size: 1.5rem;  font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; }
.headline-sm{ font-family: 'Manrope'; font-size: 1.125rem;font-weight: 600; letter-spacing: -0.015em; }
.title-lg   { font-family: 'Inter';   font-size: 1rem;    font-weight: 600; letter-spacing: -0.01em; }
.title-md   { font-family: 'Inter';   font-size: 0.875rem;font-weight: 600; }
.body-lg    { font-family: 'Inter';   font-size: 1rem;    font-weight: 400; line-height: 1.6; }
.body-md    { font-family: 'Inter';   font-size: 0.875rem;font-weight: 400; line-height: 1.55; }
.body-sm    { font-family: 'Inter';   font-size: 0.8125rem;font-weight: 400; line-height: 1.5; }
.label-lg   { font-family: 'Inter';   font-size: 0.875rem;font-weight: 500; }
.label-md   { font-family: 'Inter';   font-size: 0.8125rem;font-weight: 500; }
.label-sm   { font-family: 'Inter';   font-size: 0.6875rem;font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }

.muted { color: var(--on_surface_variant); }
.faint { color: var(--outline); }

/* ---- shell ---- */
.app-shell {
  display: grid;
  grid-template-columns: auto 1fr;
  min-height: 100vh;
  background: var(--surface);
}

.sidebar {
  background: var(--surface_container_low);
  padding: var(--s-6) var(--s-3);
  display: flex;
  flex-direction: column;
  gap: var(--s-8);
  transition: width 200ms cubic-bezier(.2,.7,.2,1);
  width: 248px;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sidebar.collapsed { width: 68px; padding: var(--s-6) var(--s-2); }

.sidebar-brand {
  display: flex; align-items: center; gap: var(--s-3);
  padding: 0 var(--s-2);
  margin-bottom: var(--s-2);
  font-family: 'Manrope'; font-weight: 700; font-size: 1.125rem;
  letter-spacing: -0.02em;
  color: var(--on_surface);
}
.brand-mark {
  width: 28px; height: 28px;
  border-radius: var(--r-md);
  background: var(--primary_container);
  color: var(--on_primary);
  display: grid; place-items: center;
  font-family: 'Manrope'; font-weight: 700;
  flex: none;
}

.nav-section { display: flex; flex-direction: column; gap: 2px; }
.nav-section-label {
  padding: 0 var(--s-3);
  margin-bottom: var(--s-2);
  color: var(--outline);
}
.nav-item {
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-2) var(--s-3);
  border-radius: var(--r-md);
  color: var(--on_surface_variant);
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  white-space: nowrap;
  transition: background 120ms, color 120ms;
  border: none; background: none; text-align: left; width: 100%;
  font-family: inherit;
}
.nav-item:hover { background: var(--surface_container); color: var(--on_surface); }
.nav-item.active { background: var(--primary_container); color: var(--on_primary); }
.nav-item .ico { flex: none; width: 18px; height: 18px; display: grid; place-items: center; }
.sidebar.collapsed .nav-item-label { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: var(--s-3); }
.sidebar.collapsed .nav-section-label { display: none; }
.sidebar.collapsed .sidebar-brand span:last-child { display: none; }
.nav-item .count {
  margin-left: auto;
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--outline);
  background: var(--surface_container_high);
  padding: 2px 8px;
  border-radius: 999px;
}
.nav-item.active .count { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }

.sidebar-footer {
  margin-top: auto;
  padding: var(--s-3);
  display: flex; align-items: center; gap: var(--s-3);
  border-radius: var(--r-lg);
  background: var(--surface_container);
  cursor: pointer;
}
.sidebar.collapsed .sidebar-footer { padding: var(--s-2); justify-content: center; }
.avatar {
  width: 32px; height: 32px; flex: none;
  border-radius: 50%;
  background: var(--secondary);
  color: var(--on_secondary);
  display: grid; place-items: center;
  font-weight: 600; font-size: 0.75rem;
}
.avatar.lg { width: 40px; height: 40px; font-size: 0.875rem; }
.avatar-meta { display: flex; flex-direction: column; min-width: 0; }
.avatar-meta .name { font-size: 0.8125rem; font-weight: 600; color: var(--on_surface); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.avatar-meta .role { font-size: 0.6875rem; color: var(--on_surface_variant); }
.sidebar.collapsed .avatar-meta { display: none; }

/* ---- main area ---- */
.main { display: flex; flex-direction: column; min-width: 0; }

.topbar {
  display: flex; align-items: center; gap: var(--s-4);
  padding: var(--s-3) var(--s-8);
  background: var(--surface_container_low);
  position: sticky; top: 0; z-index: 10;
}
.topbar .omnibar {
  flex: 1; max-width: 560px;
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-2) var(--s-4);
  background: var(--surface_container_high);
  border-radius: var(--r-lg);
  color: var(--on_surface_variant);
  cursor: text;
  transition: background 120ms;
}
.topbar .omnibar:hover { background: var(--surface_container_highest); }
.topbar .omnibar kbd {
  margin-left: auto;
  font-family: 'JetBrains Mono';
  font-size: 0.6875rem;
  padding: 2px 6px;
  background: var(--surface_container_lowest);
  border-radius: var(--r-sm);
  color: var(--outline);
}
.topbar-actions { display: flex; align-items: center; gap: var(--s-2); margin-left: auto; }
.icon-btn {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  border-radius: var(--r-md);
  background: transparent; border: none;
  color: var(--on_surface_variant);
  cursor: pointer;
  position: relative;
  transition: background 120ms;
}
.icon-btn:hover { background: var(--surface_container_high); color: var(--on_surface); }
.icon-btn .dot {
  position: absolute; top: 8px; right: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--tertiary);
}

.page {
  padding: var(--s-10) var(--s-10);
  max-width: 1600px;
}
.page-wide { max-width: none; padding: var(--s-8) var(--s-10); }

/* ---- page header ---- */
.page-header {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: var(--s-8);
  margin-bottom: var(--s-10);
}
.page-header .eyebrow {
  color: var(--outline);
  margin-bottom: var(--s-3);
}
.page-header h1 {
  margin: 0;
  max-width: 720px;
}
.page-header .sub {
  margin-top: var(--s-3);
  color: var(--on_surface_variant);
  max-width: 560px;
}

/* ---- buttons ---- */
.btn {
  display: inline-flex; align-items: center; gap: var(--s-2);
  padding: var(--s-2) var(--s-4);
  border-radius: var(--r-md);
  font-family: 'Inter'; font-size: 0.875rem; font-weight: 500;
  border: none; cursor: pointer;
  white-space: nowrap;
  transition: background 120ms, transform 60ms;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--primary_container); color: var(--on_primary); }
.btn-primary:hover { background: var(--primary); }
.btn-secondary { background: var(--secondary); color: var(--on_secondary); }
.btn-secondary:hover { filter: brightness(1.1); }
.btn-ghost { background: transparent; color: var(--primary_container); font-weight: 600; }
.btn-ghost:hover { background: var(--surface_container); }
.btn-surface { background: var(--surface_container_high); color: var(--on_surface); }
.btn-surface:hover { background: var(--surface_container_highest); }
.btn-lg { padding: var(--s-3) var(--s-5); font-size: 0.9375rem; }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }
.btn-icon-only { padding: var(--s-2); }

/* ---- badges ---- */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.badge .bullet { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge-success { background: var(--success_container); color: var(--success); }
.badge-warning { background: var(--warning_container); color: var(--warning); }
.badge-error   { background: var(--error_container); color: var(--error); }
.badge-neutral { background: var(--surface_container_high); color: var(--on_surface_variant); }
.badge-primary { background: color-mix(in srgb, var(--primary_container) 12%, transparent); color: var(--primary_container); }
.badge-tertiary{ background: var(--tertiary_container); color: var(--on_tertiary_container); }

/* ---- cards ---- */
.card {
  background: var(--surface_container_low);
  border-radius: var(--r-xl);
  padding: var(--s-6);
}
.card-raised {
  background: var(--surface_container_lowest);
  border-radius: var(--r-xl);
  padding: var(--s-6);
  box-shadow: var(--shadow-sm);
}
.card-flat { background: var(--surface_container); border-radius: var(--r-xl); padding: var(--s-6); }

/* ---- kpi ---- */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--s-4);
}
.kpi {
  background: var(--surface_container_lowest);
  border-radius: var(--r-xl);
  padding: var(--s-6);
  display: flex; flex-direction: column; gap: var(--s-5);
  min-height: 160px;
}
.kpi .kpi-label {
  color: var(--on_surface_variant);
  font-size: 0.8125rem;
  font-weight: 500;
}
.kpi .kpi-value {
  font-family: 'Manrope';
  font-size: 2.75rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--on_surface);
}
.kpi .kpi-unit { color: var(--outline); font-size: 1.25rem; font-weight: 500; margin-left: 4px; }
.kpi .kpi-delta { font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
.kpi .kpi-delta.up   { color: var(--success); }
.kpi .kpi-delta.down { color: var(--error); }
.kpi-foot { display: flex; align-items: center; justify-content: space-between; color: var(--on_surface_variant); font-size: 0.75rem; }

/* ---- tables ---- */
.table-wrap {
  background: var(--surface_container_lowest);
  border-radius: var(--r-xl);
  overflow: hidden;
}
table.v-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.875rem;
}
.v-table th, .v-table td {
  padding: var(--s-3) var(--s-5);
  text-align: left;
  vertical-align: middle;
}
.v-table thead th {
  background: var(--surface_container_low);
  color: var(--outline);
  font-weight: 600;
  font-size: 0.6875rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: var(--s-3) var(--s-5);
}
.v-table tbody tr { cursor: pointer; transition: background 80ms; }
.v-table tbody tr:hover { background: var(--surface_container_low); }
.v-table tbody td { color: var(--on_surface); }

/* ---- inputs ---- */
.field { display: flex; flex-direction: column; gap: var(--s-2); }
.field-label { font-size: 0.75rem; font-weight: 600; color: var(--on_surface_variant); letter-spacing: 0.02em; text-transform: uppercase; }
.input, .textarea, .select {
  width: 100%;
  background: var(--surface_container_high);
  border: none;
  border-bottom: 1px solid transparent;
  padding: var(--s-3) var(--s-4);
  border-radius: var(--r-md) var(--r-md) 0 0;
  font-family: inherit;
  font-size: 0.875rem;
  color: var(--on_surface);
  outline: none;
  transition: border-color 120ms, background 120ms;
}
.input:hover, .textarea:hover, .select:hover { background: var(--surface_container_highest); }
.input:focus, .textarea:focus, .select:focus { border-bottom-color: var(--primary_container); background: var(--surface_container_highest); }
.input::placeholder, .textarea::placeholder { color: var(--outline); }
.textarea { min-height: 120px; resize: vertical; line-height: 1.6; }

/* ---- tabs ---- */
.tabs { display: flex; gap: var(--s-2); align-items: center; }
.tab {
  padding: var(--s-2) var(--s-4);
  border-radius: var(--r-md);
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--on_surface_variant);
  cursor: pointer;
}
.tab:hover { color: var(--on_surface); background: var(--surface_container); }
.tab.active { color: var(--on_surface); background: var(--surface_container_high); }

/* ---- drawer ---- */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(2, 26, 32, 0.32);
  backdrop-filter: blur(6px);
  z-index: 50;
  animation: fade-in 160ms ease;
}
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 640px;
  max-width: 92vw;
  background: var(--surface_container_lowest);
  box-shadow: -12px 0 40px rgba(2, 48, 57, 0.08);
  z-index: 51;
  display: flex; flex-direction: column;
  animation: slide-in 220ms cubic-bezier(.2,.7,.2,1);
}
.drawer.wide { width: 860px; }
.drawer-header {
  padding: var(--s-6) var(--s-8);
  background: var(--surface_container_low);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-body { flex: 1; overflow: auto; padding: var(--s-8); }
.drawer-foot { padding: var(--s-4) var(--s-8); background: var(--surface_container_low); display: flex; gap: var(--s-3); justify-content: flex-end; }

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes slide-in { from { transform: translateX(100%); } to { transform: translateX(0); } }

/* ---- modal ---- */
.modal {
  position: fixed; inset: 0;
  z-index: 60;
  display: grid; place-items: center;
  padding: var(--s-6);
  background: rgba(2, 26, 32, 0.32);
  backdrop-filter: blur(6px);
  animation: fade-in 160ms ease;
}
.modal-card {
  width: 720px; max-width: 100%;
  background: var(--surface_container_lowest);
  border-radius: var(--r-2xl);
  box-shadow: 0px 20px 40px rgba(2, 48, 57, 0.12);
  overflow: hidden;
}

/* ---- toast ---- */
.toast-host {
  position: fixed; right: var(--s-6); bottom: var(--s-6);
  z-index: 100;
  display: flex; flex-direction: column; gap: var(--s-3);
  max-width: 360px;
}
.toast {
  background: rgba(255,255,255,0.84);
  backdrop-filter: blur(20px);
  border-radius: var(--r-lg);
  padding: var(--s-3) var(--s-4);
  box-shadow: 0 8px 24px rgba(2, 48, 57, 0.12);
  display: flex; align-items: flex-start; gap: var(--s-3);
  animation: slide-up 180ms cubic-bezier(.2,.7,.2,1);
  min-width: 280px;
}
.toast .tico { flex: none; margin-top: 2px; }
.toast .ttitle { font-size: 0.875rem; font-weight: 600; color: var(--on_surface); }
.toast .tsub { font-size: 0.75rem; color: var(--on_surface_variant); margin-top: 2px; }
@keyframes slide-up { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ---- misc ---- */
.divider-space { height: var(--s-8); }
.hstack { display: flex; align-items: center; gap: var(--s-3); }
.vstack { display: flex; flex-direction: column; gap: var(--s-3); }
.grow { flex: 1; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: var(--surface_container_high);
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--on_surface_variant);
}
.chip .x { cursor: pointer; color: var(--outline); }

.progress {
  height: 6px;
  border-radius: 999px;
  background: var(--surface_container_high);
  overflow: hidden;
  position: relative;
}
.progress .bar {
  height: 100%;
  background: var(--tertiary);
  border-radius: 999px;
  transition: width 300ms ease;
}
.progress.thick { height: 10px; }

.spinner {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--outline_variant);
  border-top-color: var(--primary_container);
  animation: spin 800ms linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.skeleton {
  background: linear-gradient(90deg, var(--surface_container) 0%, var(--surface_container_high) 50%, var(--surface_container) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
  border-radius: var(--r-sm);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ---- code / mono blocks ---- */
.mono-block {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8125rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}

/* prompt variable highlight */
.prompt-var {
  background: var(--tertiary_container);
  color: var(--on_tertiary_container);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono';
  font-size: 0.8125em;
  font-weight: 600;
}

/* markdown-ish content in output */
.md-out h1, .md-out h2, .md-out h3 { font-family: 'Manrope'; letter-spacing: -0.02em; }
.md-out h2 { font-size: 1.125rem; margin-top: 1.25em; margin-bottom: 0.4em; }
.md-out ul { padding-left: 1.25em; }
.md-out li { margin: 0.25em 0; }
.md-out strong { color: var(--on_surface); }
.md-out code { font-family: 'JetBrains Mono'; font-size: 0.85em; background: var(--surface_container_high); padding: 1px 5px; border-radius: 4px; }

/* login */
.login-root {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  background: var(--surface);
}
.login-hero {
  background: linear-gradient(155deg, var(--primary_container) 0%, var(--primary) 100%);
  color: var(--on_primary);
  padding: var(--s-16);
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.login-hero::after {
  content: "";
  position: absolute; right: -200px; bottom: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(217,108,63,0.20) 0%, transparent 70%);
  pointer-events: none;
}
.login-form-col {
  display: grid; place-items: center;
  padding: var(--s-12);
}
.login-form {
  width: 100%;
  max-width: 380px;
}

/* gradient hero */
.gradient-hero {
  background: linear-gradient(135deg, var(--primary_container) 0%, var(--primary) 100%);
  color: var(--on_primary);
  border-radius: var(--r-2xl);
  padding: var(--s-10);
  position: relative;
  overflow: hidden;
}
.gradient-hero::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(circle at 85% 20%, rgba(217,108,63,0.14), transparent 60%);
  pointer-events: none;
}

/* caret blink */
.caret::after {
  content: "▍";
  color: var(--primary_container);
  animation: blink 1s step-end infinite;
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* diff colors */
.diff-add   { background: rgba(63,125,88,0.14);  color: var(--success); text-decoration: none; }
.diff-rem   { background: rgba(154,42,42,0.12);  color: var(--error); text-decoration: line-through; opacity: 0.75; }

/* scrollbars — slim */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface_container_highest); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--outline_variant); border: 2px solid transparent; background-clip: padding-box; }

</style>

// --- Chart: Line/Area sparkline ---
const AreaChart = ({ data, w = 560, h = 160, accessor = d => d.exec, labels = d => d.w, color = '#023039', fill = 'rgba(2, 48, 57, 0.10)' }) => {
  const padL = 36, padR = 10, padT = 12, padB = 28;
  const iw = w - padL - padR, ih = h - padT - padB;
  const ys = data.map(accessor);
  const maxY = Math.max(...ys);
  const minY = 0;
  const xAt = i => padL + (i / (data.length - 1)) * iw;
  const yAt = v => padT + ih - ((v - minY) / (maxY - minY)) * ih;
  const pathD = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i)} ${yAt(accessor(d))}`).join(' ');
  const areaD = `${pathD} L ${xAt(data.length - 1)} ${padT + ih} L ${xAt(0)} ${padT + ih} Z`;
  const ticks = [0, 0.5, 1].map(t => Math.round(maxY * t));
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ display: 'block' }}>
      {ticks.map((t, i) => {
        const y = yAt(t);
        return (
          <g key={i}>
            <line x1={padL} x2={w - padR} y1={y} y2={y} stroke="var(--surface_container_highest)" strokeDasharray="2 4" />
            <text x={padL - 8} y={y + 3} textAnchor="end" fontSize="10" fontFamily="JetBrains Mono" fill="var(--outline)">{t.toLocaleString()}</text>
          </g>
        );
      })}
      <path d={areaD} fill={fill} />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2" />
      {data.map((d, i) => (
        <circle key={i} cx={xAt(i)} cy={yAt(accessor(d))} r="3.5" fill="var(--surface_container_lowest)" stroke={color} strokeWidth="2" />
      ))}
      {data.map((d, i) => (
        <text key={i} x={xAt(i)} y={h - 8} textAnchor="middle" fontSize="10" fontFamily="JetBrains Mono" fill="var(--outline)">{labels(d)}</text>
      ))}
    </svg>
  );
};

// --- Donut ---
const Donut = ({ data, size = 160, thickness = 18 }) => {
  const total = data.reduce((a, b) => a + b.pct, 0);
  const r = size / 2 - thickness / 2 - 2;
  const c = size / 2;
  let acc = 0;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={c} cy={c} r={r} stroke="var(--surface_container)" strokeWidth={thickness} fill="none" />
      {data.map((d, i) => {
        const frac = d.pct / total;
        const dash = frac * circ;
        const offset = -acc * circ;
        acc += frac;
        return (
          <circle
            key={i} cx={c} cy={c} r={r} fill="none"
            stroke={d.color} strokeWidth={thickness}
            strokeDasharray={`${dash} ${circ - dash}`}
            strokeDashoffset={offset}
            transform={`rotate(-90 ${c} ${c})`}
            strokeLinecap="butt"
          />
        );
      })}
    </svg>
  );
};

// --- Bars ---
const BarChart = ({ data, w = 320, h = 100, accessor = d => d.approvals, color = '#7b5456' }) => {
  const max = Math.max(...data.map(accessor));
  const bw = (w - 10) / data.length - 6;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h}>
      {data.map((d, i) => {
        const bh = (accessor(d) / max) * (h - 20);
        const x = 5 + i * (bw + 6);
        const y = h - bh - 16;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx="2" fill={color} opacity="0.9" />
            <text x={x + bw / 2} y={h - 4} textAnchor="middle" fontSize="9" fontFamily="JetBrains Mono" fill="var(--outline)">{d.w.slice(-2)}</text>
          </g>
        );
      })}
    </svg>
  );
};

// --- Toast host ---
const ToastContext = createContext(null);
const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const toast = (t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(list => [...list, { id, ...t }]);
    setTimeout(() => setToasts(list => list.filter(x => x.id !== id)), t.duration || 3800);
  };
  return (
    <ToastContext.Provider value={toast}>
      {children}
      <div className="toast-host">
        {toasts.map(t => {
          const toneColor = t.tone === 'success' ? 'var(--success)'
                          : t.tone === 'error'   ? 'var(--error)'
                          : t.tone === 'warn'    ? 'var(--warning)'
                          : 'var(--primary_container)';
          return (
            <div className="toast" key={t.id}>
              <div className="tico" style={{ color: toneColor }}>
                <Icon name={t.icon || 'info'} size={18} />
              </div>
              <div style={{ flex: 1 }}>
                <div className="ttitle">{t.title}</div>
                {t.sub && <div className="tsub">{t.sub}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </ToastContext.Provider>
  );
};
const useToast = () => useContext(ToastContext);

// --- Prompt text rendered w/ variable pills ---
const PromptText = ({ text }) => {
  const parts = text.split(/(\{\{\s*[\w.-]+\s*\}\})/g);
  return (
    <div className="mono-block">
      {parts.map((p, i) =>
        /^\{\{.*\}\}$/.test(p)
          ? <span className="prompt-var" key={i}>{p}</span>
          : <span key={i}>{p}</span>
      )}
    </div>
  );
};

// simulated streaming hook
const useStreamingText = (fullText, active, speed = 22) => {
  const [out, setOut] = useState('');
  useEffect(() => {
    if (!active) return;
    setOut('');
    let i = 0;
    const id = setInterval(() => {
      i += speed;
      setOut(fullText.slice(0, i));
      if (i >= fullText.length) clearInterval(id);
    }, 30);
    return () => clearInterval(id);
  }, [active, fullText]);
  return out;
};

// --- Prompt editor with variable pills overlay
const PromptEditor = ({ value, onChange }) => {
  const taRef = useRef();
  const overlayRef = useRef();

  const overlayHtml = useMemo(() => {
    const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return esc(value).replace(/\{\{\s*([\w.-]+)\s*\}\}/g, '<span class="prompt-var"></body></span>').replace(/\n/g, '<br/>') + '<br/>';
  }, [value]);

  const sync = () => {
    if (taRef.current && overlayRef.current) {
      overlayRef.current.scrollTop = taRef.current.scrollTop;
    }
  };

  return (
    <div style={{ position: 'relative', background: 'var(--surface_container_lowest)', borderRadius: 'var(--r-lg)', overflow: 'hidden' }}>
      <div ref={overlayRef} aria-hidden="true"
           className="mono-block"
           style={{
             position: 'absolute', inset: 0,
             padding: 20, margin: 0,
             pointerEvents: 'none',
             color: 'var(--on_surface)',
             whiteSpace: 'pre-wrap', wordBreak: 'break-word',
             overflow: 'hidden',
           }}
           dangerouslySetInnerHTML={{ __html: overlayHtml }} />
      <textarea
        ref={taRef}
        value={value}
        onChange={e => onChange(e.target.value)}
        onScroll={sync}
        spellCheck={false}
        style={{
          width: '100%',
          background: 'transparent',
          color: 'transparent',
          caretColor: 'var(--primary_container)',
          border: 'none',
          padding: 20,
          fontFamily: 'JetBrains Mono, monospace',
          fontSize: 13,
          lineHeight: 1.65,
          minHeight: 440,
          outline: 'none',
          resize: 'vertical',
          position: 'relative',
          whiteSpace: 'pre-wrap', wordBreak: 'break-word',
        }}
      />
    </div>
  );
};

// Transcript editor — timestamped blocks + mini player
const ScreenTranscriptEditor = ({ onBack, onRunPrompt }) => {
  const toast = useToast();
  const t = DATA.featuredTranscript;
  const [playing, setPlaying] = useState(false);

  useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => setTime(x => Math.min(x + 1 * speed, totalSec)), 1000 / speed);
    return () => clearInterval(id);
  }, [playing, speed]);

  const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(Math.floor(s % 60)).padStart(2, '0')}`;

  return (
    <div style={{ height: 'calc(100vh - 56px)', display: 'flex', flexDirection: 'column' }}>

        <div style={{ flex: 1 }}>
          <div className="hstack" style={{ gap: 8 }}>
            <span className="label-sm faint font-mono">{t.id}</span>
            <StatusBadge status={t.status} />
            <span className="label-sm muted">{t.meta.editor}</span>
          </div>
          <div className="headline-md" style={{ marginTop: 2 }}>{t.title}</div>
        </div>
        <div className="hstack" style={{ gap: 8 }}>
          <button className="btn btn-surface"><Icon name="download" size={16} /> Descargar PDF</button>
          <button className="btn btn-surface"><Icon name="version" size={16} /> Guardar versión</button>
          <button className="btn btn-primary" onClick={onRunPrompt}><Icon name="play" size={16} /> Aplicar Prompt</button>
        </div>
      </div>

      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 380px', overflow: 'hidden' }}>
        {/* Main transcript */}

          <div style={{ maxWidth: 760, margin: '0 auto' }}>
            <div className="hstack" style={{ gap: 6, flexWrap: 'wrap', marginBottom: 24 }}>
              {t.tags.map(g => <span key={g} className="chip">#{g}</span>)}
              <span className="chip"><Icon name="clock" size={12} /> {t.dur}</span>
              <span className="chip"><Icon name="user" size={12} /> {t.meta.participantes} participantes</span>
              <span className="chip">{t.lang}</span>
            </div>

            <div className="vstack" style={{ gap: 24 }}>
              {blocks.map((b, i) => {
                const isActive = i === activeIdx;
                return (
                  <div key={i}
                       onClick={() => setActiveIdx(i)}
                       style={{
                         display: 'grid', gridTemplateColumns: '64px 1fr', gap: 20,
                         padding: 16,
                         borderRadius: 'var(--r-lg)',
                         background: isActive ? 'var(--surface_container_low)' : 'transparent',
                         cursor: 'pointer',
                         transition: 'background 120ms',
                       }}>
                    <div>
                      <div className="label-sm muted font-mono">{b.t}</div>
                    </div>
                    <div>
                      <div className="label-md" style={{ color: 'var(--primary_container)', fontWeight: 600, marginBottom: 6 }}>{b.speaker}</div>
                      {editingIdx === i ? (
                        <textarea
                          className="textarea"
                          defaultValue={b.text}
                          autoFocus
                          onBlur={(e) => { const next = [...blocks]; next[i] = { ...b, text: e.target.value }; setBlocks(next); setEditingIdx(null); toast({ tone: 'success', icon: 'check', title: 'Corrección guardada', sub: `Bloque @${b.t}` }); }}
                          style={{ fontSize: '1rem', fontFamily: 'Inter', minHeight: 70 }}
                        />
                      ) : (
                        <div className="body-lg" onDoubleClick={() => setEditingIdx(i)}>
                          {b.text}
                        </div>
                      )}
                      {isActive && editingIdx !== i && (
                        <div className="hstack" style={{ gap: 8, marginTop: 10 }}>
                          <button className="btn btn-ghost btn-sm" onClick={() => setEditingIdx(i)}><Icon name="edit" size={12} /> Corregir</button>

                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Sidebar — insights */}
        <aside style={{ background: 'var(--surface_container_low)', overflow: 'auto', padding: 24 }}>
          <div className="label-sm muted" style={{ marginBottom: 8 }}>ANÁLISIS AUTOMÁTICO</div>
          <div className="headline-sm" style={{ marginBottom: 16 }}>Entidades detectadas</div>
          <div className="vstack" style={{ gap: 8, marginBottom: 24 }}>
            {[
              { l: 'BBVA', k: 'Cliente' },
              { l: 'MT-940', k: 'Estándar' },
              { l: 'Helena Ruiz', k: 'Persona' },
              { l: 'Javier Aguilar', k: 'Persona · externa' },
              { l: 'Marc Oller', k: 'Persona' },
              { l: '4,2 M notificaciones', k: 'Métrica' },
              { l: '780 ms', k: 'Métrica · latencia' },
              { l: 'viernes', k: 'Fecha compromiso' },

              <div key={i} className="hstack" style={{ padding: '8px 10px', background: 'var(--surface_container_lowest)', borderRadius: 'var(--r-md)' }}>
                <div>
                  <div className="body-md" style={{ fontWeight: 500 }}>{e.l}</div>
                  <div className="label-sm muted">{e.k}</div>

                <Icon name="sparkle" size={14} style={{ color: 'var(--tertiary)' }} />
                <span className="body-md">{pr}</span>
                <Icon name="chevron-r" size={14} style={{ marginLeft: 'auto', color: 'var(--outline)' }} />
              </button>
            ))}
          </div>
        </aside>
      </div>

      {/* Floating media dock */}
      <div style={{
        position: 'absolute', bottom: 24, left: '50%', transform: 'translateX(-50%)',
        width: 760, maxWidth: '92%',
        background: 'rgba(255, 255, 255, 0.82)', backdropFilter: 'blur(20px)',
        borderRadius: 14, padding: '14px 20px',
        boxShadow: '0 20px 40px rgba(2,48,57,0.12)',
        display: 'flex', alignItems: 'center', gap: 16,
      }}>
        <button className="icon-btn" style={{ background: 'var(--primary_container)', color: 'white' }} onClick={() => setPlaying(p => !p)}>

        <span className="label-sm font-mono muted">{fmt(time)}</span>
        <div style={{ flex: 1, position: 'relative', height: 28, display: 'flex', alignItems: 'center', gap: 2 }}>
          {Array.from({ length: 80 }).map((_, i) => {
            const pos = i / 80;
            const h = 6 + Math.abs(Math.sin(i * 0.7 + Math.cos(i * 0.3))) * 18;
            return <div key={i} style={{ flex: 1, height: h, background: pos < time / totalSec ? 'var(--primary_container)' : 'var(--outline_variant)', borderRadius: 1 }} />;
          })}
        </div>
        <span className="label-sm font-mono muted">{fmt(totalSec)}</span>
        <button className="btn btn-surface btn-sm" onClick={() => setSpeed(s => s === 1 ? 1.5 : s === 1.5 ? 2 : 1)}>{speed}×</button>
      </div>
    </div>
  );
};

              <div key={i} className="hstack" style={{ padding: '14px 0', borderTop: i === 0 ? 'none' : '1px solid var(--surface_container_high)' }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--surface_container_low)', display: 'grid', placeItems: 'center', color: e.tone, flex: 'none' }}>
                  <Icon name={e.icon} size={16} />
                </div>
                <span className="body-md" style={{ flex: 1 }}>{e.t}</span>
                <span className="label-sm muted font-mono">hoy · {e.at}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

window.ScreenAdmin = ScreenAdmin;


// ====== tweaks.jsx ======
// Tweaks panel
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "teal",
  "density": "balanced",
  "sidebarCollapsed": false,
  "role": "Consumidor"
}/*EDITMODE-END*/;

const ACCENTS = {
  teal:   { name: 'Teal (default)',    primary: '#023039', secondary: '#7b5456' },
  maroon: { name: 'Maroon dominante',  primary: '#5c2b35', secondary: '#023039' },
  forest: { name: 'Bosque',            primary: '#1e3f32', secondary: '#7b5456' },
  coral:  { name: 'Coral ejecutivo',   primary: '#8a3a1f', secondary: '#023039' },
};

const TweaksPanel = ({ open, state, setState, onClose }) => {
  useEffect(() => {
    const acc = ACCENTS[state.accent] || ACCENTS.teal;
    document.documentElement.style.setProperty('--primary_container', acc.primary);
    document.documentElement.style.setProperty('--secondary', acc.secondary);
  }, [state.accent]);

  if (!open) return null;
  const set = (k, v) => {
    const next = { ...state, [k]: v };
    setState(next);
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
  };

  return (
    <div style={{
      position: 'fixed', right: 24, bottom: 24, width: 320, zIndex: 80,
      background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(20px)',
      borderRadius: 16, boxShadow: '0 20px 40px rgba(2,48,57,0.14)',
      animation: 'slide-up 180ms cubic-bezier(.2,.7,.2,1)',
    }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div className="hstack" style={{ gap: 8 }}>
          <Icon name="settings" size={16} />
          <span className="title-md">Tweaks</span>
        </div>
        <button className="icon-btn" onClick={onClose}><Icon name="x" size={14}/></button>
      </div>
      <div style={{ padding: 18, paddingTop: 4 }}>
        <div className="vstack" style={{ gap: 20 }}>
          <div>
            <div className="label-sm muted" style={{ marginBottom: 8 }}>ROL DE USUARIO</div>
            <div className="hstack" style={{ gap: 6, flexWrap: 'wrap' }}>
              {['Administrador', 'Aprobador', 'Editor', 'Consumidor'].map(r => (
                <button key={r} className="btn btn-sm" style={{
                  background: state.role === r ? 'var(--primary_container)' : 'var(--surface_container_high)',
                  color: state.role === r ? 'white' : 'var(--on_surface)',
                }} onClick={() => set('role', r)}>{r}</button>
              ))}
            </div>
          </div>

          <div>
            <div className="label-sm muted" style={{ marginBottom: 8 }}>ACENTO DE MARCA</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              {Object.entries(ACCENTS).map(([k, a]) => (
                <button key={k} onClick={() => set('accent', k)} className="hstack"
                  style={{ padding: 10, borderRadius: 8, cursor: 'pointer', background: state.accent === k ? 'var(--surface_container_high)' : 'transparent', border: 'none', textAlign: 'left' }}>
                  <span style={{ width: 18, height: 18, borderRadius: 4, background: a.primary, flex: 'none' }}/>
                  <span className="label-md">{a.name}</span>
                </button>
              ))}
            </div>
          </div>

          <div>
            <div className="label-sm muted" style={{ marginBottom: 8 }}>DENSIDAD</div>
            <div className="hstack" style={{ gap: 6 }}>
              {['balanced', 'comfortable', 'compact'].map(d => (
                <button key={d} className="btn btn-sm" style={{
                  background: state.density === d ? 'var(--primary_container)' : 'var(--surface_container_high)',
                  color: state.density === d ? 'white' : 'var(--on_surface)',
                }} onClick={() => set('density', d)}>{d}</button>
              ))}
            </div>
          </div>

          <div className="hstack" style={{ justifyContent: 'space-between' }}>
            <span className="label-md">Sidebar plegada</span>
            <Toggle value={state.sidebarCollapsed} onChange={() => set('sidebarCollapsed', !state.sidebarCollapsed)} />
          </div>
        </div>
      </div>
    </div>
  );
};

window.TweaksPanel = TweaksPanel;
window.TWEAK_DEFAULTS = TWEAK_DEFAULTS;


// ====== app.jsx ======
// Main App
const App = () => {
  const persistedView = typeof localStorage !== 'undefined' ? localStorage.getItem('vellum-view') : null;
  const [authed, setAuthed] = useState(() => (typeof localStorage !== 'undefined' ? localStorage.getItem('vellum-auth') === '1' : false));
  const [view, setView] = useState(persistedView || 'dashboard');
  const [openPromptId, setOpenPromptId] = useState(null);
  const [openTranscriptId, setOpenTranscriptId] = useState(null);
  const [notifOpen, setNotifOpen] = useState(false);
  const [theme, setTheme] = useState('light');

  const [tweakState, setTweakState] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // sidebar collapsed follows tweak state
  const sidebarCollapsed = tweakState.sidebarCollapsed;

  useEffect(() => { try { localStorage.setItem('vellum-view', view); } catch {} }, [view]);
  useEffect(() => { try { localStorage.setItem('vellum-auth', authed ? '1' : '0'); } catch {} }, [authed]);

  // theme class on root
  useEffect(() => {
    document.documentElement.classList.toggle('theme-dark', theme === 'dark');
  }, [theme]);

  // Edit mode bridge
  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', handler);
  }, []);

  if (!authed) {
    return (
      <ToastProvider>
        <ScreenLogin onEnter={() => setAuthed(true)} />
      </ToastProvider>
    );
  }

  const navigate = (v) => {
    setOpenPromptId(null);
    setOpenTranscriptId(null);
    setView(v);
  };

  let screen = null;
  if (openPromptId)          screen = <ScreenPromptEditor onBack={() => setOpenPromptId(null)} />;
  else if (openTranscriptId) screen = <ScreenTranscriptEditor onBack={() => setOpenTranscriptId(null)} onRunPrompt={() => { setOpenTranscriptId(null); setView('playground'); }} />;
  else if (view === 'dashboard')   screen = <ScreenDashboard onNav={navigate} />;
  else if (view === 'prompts')     screen = <ScreenPrompts onOpenPrompt={(id) => setOpenPromptId(id)} />;
  else if (view === 'transcripts') screen = <ScreenTranscripts onOpen={(id) => setOpenTranscriptId(id)} />;
  else if (view === 'playground')  screen = <ScreenPlayground />;
  else if (view === 'connectors')  screen = <ScreenConnectors />;
  else if (view === 'history')     screen = <ScreenHistory />;
  else if (view === 'admin')       screen = <ScreenAdmin />;

  const isEditorMode = !!openPromptId || !!openTranscriptId;

  return (
    <ToastProvider>
      <div className="app-shell">
        <Sidebar current={view} onNav={navigate} collapsed={sidebarCollapsed} onToggle={() => setTweakState(s => ({...s, sidebarCollapsed: !s.sidebarCollapsed}))} />
        <main className="main">
          <Topbar theme={theme} onToggleTheme={() => setTheme(t => t === 'light' ? 'dark' : 'light')} onNotif={() => setNotifOpen(!notifOpen)} />
          {screen}
          <NotificationsPanel open={notifOpen} onClose={() => setNotifOpen(false)} />
        </main>
        <TweaksPanel open={tweaksOpen} state={tweakState} setState={setTweakState} onClose={() => setTweaksOpen(false)} />
      </div>
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
