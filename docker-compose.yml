version: "3.9"

networks:
  vellum-internal:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vellum
      POSTGRES_USER: vellum_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      DAL_APP_PASSWORD: ${DAL_APP_PASSWORD:-changeme_app}
      DAL_MIGRATOR_PASSWORD: ${DAL_MIGRATOR_PASSWORD:-changeme_migrator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Solo se ejecuta al crear el volumen; en BDs existentes aplicar a mano
      # (ver docs/DAL-developer-guide.md).
      - ./infra/postgres/init-roles.sh:/docker-entrypoint-initdb.d/01-roles.sh:ro
    networks:
      - vellum-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellum_user -d vellum"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Contenedor efímero de migraciones: único mecanismo que aplica DDL.
  # No arranca con `docker compose up` (profile); invocación explícita:
  #   docker compose run --rm dal-migrate
  dal-migrate:
    build:
      context: ./dal
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: ./dal/.env
    environment:
      # Credenciales del rol con DDL — solo este contenedor las recibe.
      DB_USER: vellum_migrator
      DB_PASSWORD: ${DAL_MIGRATOR_PASSWORD:-changeme_migrator}
    profiles: ["migrate"]
    networks:
      - vellum-internal
    depends_on:
      postgres:
        condition: service_healthy

  dal:
    build:
      context: ./dal
      dockerfile: Dockerfile
    env_file: ./dal/.env
    environment:
      # El servicio se conecta SIN privilegios DDL (garantía estructural).
      DB_USER: vellum_app
      DB_PASSWORD: ${DAL_APP_PASSWORD:-changeme_app}
    ports: []
    networks:
      - vellum-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  # Redis interno: rate limiting distribuido del router-ai (CLAUDE.md §11).
  # Sin puerto al host (§9); credenciales para staging/prod vía REDIS_URL.
  redis:
    image: redis:7-alpine
    networks:
      - vellum-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
