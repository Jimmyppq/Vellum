networks:
  vellum-test:
    driver: bridge

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vellum_test
      POSTGRES_USER: vellum_user
      POSTGRES_PASSWORD: changeme
      DAL_APP_PASSWORD: changeme_app
      DAL_MIGRATOR_PASSWORD: changeme_migrator
    volumes:
      - ../infra/postgres/init-roles.sh:/docker-entrypoint-initdb.d/01-roles.sh:ro
    networks:
      - vellum-test
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vellum_user -d vellum_test" ]
      interval: 5s
      timeout: 3s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "pip install pytest-cov pytest-asyncio httpx anyio &&
             pytest tests/ --cov=app --cov-report=term-missing -v"
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://vellum_user:changeme@postgres-test:5432/vellum_test
      DB_HOST: postgres-test
      DB_PORT: "5432"
      DB_NAME: vellum_test
      DB_USER: vellum_user
      DB_PASSWORD: changeme
      ENV: dev
      MTLS_ENABLED: "false"
      INTERNAL_SERVICE_TOKEN: test-token
      LOG_LEVEL: WARNING
      DAL_APP_PASSWORD: changeme_app
    networks:
      - vellum-test
    depends_on:
      postgres-test:
        condition: service_healthy
