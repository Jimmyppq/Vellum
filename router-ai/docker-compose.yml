services:
  router-ai:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Compose de desarrollo local: docs sin auth. En staging/prod no usar
      # este compose o exportar ENV=prod (default del servicio si falta).
      ENV: ${ENV:-dev}
    volumes:
      - ../logs:/logs
      - ./config:/app/config
      - ./certs:/certs:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')" ]
      interval: 500s
      timeout: 10s
      retries: 3
      start_period: 10s
