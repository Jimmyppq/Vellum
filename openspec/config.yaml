context: |
  You are working in a Python project (Vellum) with FastAPI backend.
  Never generate SQL strings directly in Python code outside the data layer.
  All inter-service communication uses FastAPI + mTLS.
  Authentication is handled via JWT tokens issued by auth service.
  Secrets are managed via environment variables or secret managers (never hardcoded).
  This project follows microservice architecture: frontend, backend, router-ai, dal, worker, connectors, gateway.
  All services must implement mTLS authentication for inter-service calls.

rules:
  tasks:
    - El último bloque de tasks siempre incluye actualizar docs/
  claude.md:
    - Incluye el mapa de componentes y reglas absolutas en cada cambio.
    - Las reglas absolutas son inmutables y de cumplimiento obligatorio.